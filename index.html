<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>泪滴棱镜</title><style>body{margin:0;overflow:hidden}</style></head>
<body>
<input id="i" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;background:#000;color:#fff;border:1px solid #88f;padding:10px;border-radius:20px" placeholder="写下悲伤...">
<button id="b" style="position:fixed;bottom:20px;left:70%;z-index:100;background:#46f;color:#fff;border:none;padding:10px 20px;border-radius:20px">绽放</button>
<div id="m" style="position:fixed;bottom:80px;right:10px;color:#88f;background:#000;padding:5px;border-radius:10px">0%</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
const s=new THREE.Scene();s.background=new THREE.Color(0x050510);
const c=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,1000);c.position.set(2,1.5,3.5);
const r=new THREE.WebGLRenderer();r.setSize(innerWidth,innerHeight);document.body.appendChild(r.domElement);
const l=new THREE.DirectionalLight(0xffffff,1);l.position.set(2,3,1);s.add(l);s.add(new THREE.AmbientLight(0x22223b));
let f=null,p=null,dy=0;
function sad(t){let sc=0;['痛','泪','悲','伤','碎'].forEach(k=>{if(t.includes(k))sc+=0.2});return Math.min(0.9,sc+Math.min(0.3,t.length/50));}
function make(t){let g=new THREE.Group();let cr=Math.floor(8+t*40);for(let i=0;i<8;i++){let pet=new THREE.Mesh(new THREE.PlaneGeometry(0.55,0.7),new THREE.MeshStandardMaterial({color:0xc8b0ff,emissive:0x331a66,emissiveIntensity:0.3+t*0.6,metalness:0.8,transparent:true}));let ang=i*Math.PI*2/8;pet.position.set(Math.cos(ang)*0.65,0.2,Math.sin(ang)*0.65);pet.lookAt(0,0.4,0);g.add(pet);}g.add(new THREE.Mesh(new THREE.SphereGeometry(0.18),new THREE.MeshStandardMaterial({color:0x88aaff,emissive:0x3366aa})));return g;}
function part(t){let cnt=300+t*500;let geo=new THREE.BufferGeometry();let pos=[];for(let i=0;i<cnt;i++){let r=1+Math.random()*2;let a=Math.random()*Math.PI*2;let b=Math.acos(2*Math.random()-1);pos.push(Math.sin(b)*Math.cos(a)*r,Math.sin(b)*Math.sin(a)*r+0.5,Math.cos(b)*r);}geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(pos),3));return new THREE.Points(geo,new THREE.PointsMaterial({color:0x88aaff,size:0.03,blending:THREE.AdditiveBlending}));}
function kill(){if(dy)return;dy=1;let st=Date.now();function ani(){let pr=Math.min(1,(Date.now()-st)/1000);if(f)f.children.forEach(ch=>{if(ch.material)ch.material.opacity=1-pr;});if(p)p.material.opacity=1-pr;if(pr<1)requestAnimationFrame(ani);else{if(f)s.remove(f);if(p)s.remove(p);f=null;p=null;dy=0;}}ani();}
function bloom(tx){if(dy)return;let val=sad(tx||"默");document.getElementById('m').innerHTML=Math.floor(val*100)+'%';if(f)kill();setTimeout(()=>{if(!dy&&!f){f=make(val);s.add(f);p=part(val);s.add(p);f.scale.set(0,0,0);let g=0;function gr(){g+=0.05;let sc=Math.min(1,g);if(f)f.scale.set(sc,sc,sc);if(sc<1)requestAnimationFrame(gr);}gr();}},200);}
document.getElementById('b').onclick=()=>bloom(document.getElementById('i').value);
bloom("寂静");
let tm=0;function loop(){tm+=0.02;if(p&&!dy){p.rotation.y=tm*0.2;if(p.material)p.material.size=0.025+dy*0.02+Math.sin(tm*5)*0.003;}r.render(s,c);requestAnimationFrame(loop);}loop();
window.onresize=()=>{c.aspect=innerWidth/innerHeight;c.updateProjectionMatrix();r.setSize(innerWidth,innerHeight);};
</script>
</body>
</html>
